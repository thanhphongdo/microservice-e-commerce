services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - backend

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - backend

  meilisearch:
    image: getmeili/meilisearch:v1.13
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    ports:
      - "${MEILI_PUBLIC_PORT:-17700}:7700"
    volumes:
      - meili_data:/meili_data
    networks:
      - backend

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PUBLIC_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PUBLIC_PORT:-19001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - backend

  auth-service:
    image: ${AUTH_IMAGE:-docker.io/phongdosw/auth-service:latest}
    restart: unless-stopped
    depends_on:
      - kafka
      - postgres
      - redis
    environment:
      NODE_ENV: production
      GRPC_URL: 0.0.0.0:50051
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:29092}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    expose:
      - "50051"
    networks:
      - backend

  payment-service:
    image: ${PAYMENT_IMAGE:-docker.io/phongdosw/payment-service:latest}
    restart: unless-stopped
    depends_on:
      - kafka
      - postgres
      - redis
    environment:
      NODE_ENV: production
      GRPC_URL: 0.0.0.0:50052
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:29092}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    expose:
      - "50052"
    networks:
      - backend

  order-service:
    image: ${ORDER_IMAGE:-docker.io/phongdosw/order-service:latest}
    restart: unless-stopped
    depends_on:
      - kafka
      - postgres
      - redis
    environment:
      NODE_ENV: production
      GRPC_URL: 0.0.0.0:50053
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:29092}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    expose:
      - "50053"
    networks:
      - backend

  product-service:
    image: ${PRODUCT_IMAGE:-docker.io/phongdosw/product-service:latest}
    restart: unless-stopped
    depends_on:
      - kafka
      - postgres
      - redis
    environment:
      NODE_ENV: production
      GRPC_URL: 0.0.0.0:50054
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:29092}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    expose:
      - "50054"
    networks:
      - backend

  bff-gateway:
    image: ${BFF_IMAGE:-docker.io/phongdosw/bff-gateway:latest}
    restart: unless-stopped
    depends_on:
      - auth-service
      - payment-service
      - order-service
      - product-service
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3700,http://localhost:3800}
      GRAPHQL_INTROSPECTION: ${GRAPHQL_INTROSPECTION:-true}
      GRAPHQL_PLAYGROUND: ${GRAPHQL_PLAYGROUND:-true}
      AUTH_GRPC_URL: auth-service:50051
      PAYMENT_GRPC_URL: payment-service:50052
      ORDER_GRPC_URL: order-service:50053
      PRODUCT_GRPC_URL: product-service:50054
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:29092}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    ports:
      - "${BFF_PUBLIC_PORT:-3000}:3000"
    networks:
      - backend

  e-commerce-fe:
    image: ${FE_IMAGE:-docker.io/phongdosw/e-commerce-fe:latest}
    restart: unless-stopped
    depends_on:
      - bff-gateway
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_GRAPHQL_URL: ${NEXT_PUBLIC_GRAPHQL_URL:-http://localhost:${BFF_PUBLIC_PORT:-3000}/graphql}
    ports:
      - "${FE_PUBLIC_PORT:-3700}:3700"
    networks:
      - backend

  e-commerce-admin-fe:
    image: ${ADMIN_FE_IMAGE:-docker.io/phongdosw/e-commerce-admin-fe:latest}
    restart: unless-stopped
    depends_on:
      - bff-gateway
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_GRAPHQL_URL: ${ADMIN_NEXT_PUBLIC_GRAPHQL_URL:-http://localhost:${BFF_PUBLIC_PORT:-3000}/graphql}
    ports:
      - "${ADMIN_FE_PUBLIC_PORT:-3800}:3800"
    networks:
      - backend

networks:
  backend:

volumes:
  postgres_data:
  redis_data:
  meili_data:
  minio_data:

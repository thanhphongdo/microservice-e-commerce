services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '${ZOOKEEPER_EXTERNAL_PORT}:${ZOOKEEPER_CLIENT_PORT}'
    healthcheck:
      test: ['CMD-SHELL', 'echo srvr | nc -w 2 localhost 2181 | grep Mode || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:${ZOOKEEPER_CLIENT_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT}
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - '${KAFKA_EXTERNAL_PORT}:9092'
    healthcheck:
      test: ['CMD-SHELL', 'nc -z localhost 29092 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_HOST_PORT}:${POSTGRES_PORT}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - '${REDIS_HOST_PORT}:${REDIS_PORT}'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  auth-service:
    build:
      context: ../auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      GRPC_URL: 0.0.0.0:${AUTH_GRPC_PORT}
      DEBUG_PORT: ${NODE_DEBUG_PORT}
      KAFKA_BROKER: ${KAFKA_BROKER}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    ports:
      - '${AUTH_HOST_PORT}:${AUTH_GRPC_PORT}'
      - '${AUTH_DEBUG_PORT}:${NODE_DEBUG_PORT}'
    volumes:
      - ../auth-service:/usr/src/app
      - ../proto-contracts:/usr/src/proto-contracts:ro
      - auth_node_modules:/usr/src/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ] || [ ! -d node_modules/@ecommerce/proto-contracts ] || [ ! -d node_modules/@as-integrations/express5 ]; then
      npm install --prefer-offline --no-audit --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000;
      fi && npm run start:debug"

  payment-service:
    build:
      context: ../payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      GRPC_URL: 0.0.0.0:${PAYMENT_GRPC_PORT}
      DEBUG_PORT: ${NODE_DEBUG_PORT}
      KAFKA_BROKER: ${KAFKA_BROKER}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    ports:
      - '${PAYMENT_HOST_PORT}:${PAYMENT_GRPC_PORT}'
      - '${PAYMENT_DEBUG_PORT}:${NODE_DEBUG_PORT}'
    volumes:
      - ../payment-service:/usr/src/app
      - ../proto-contracts:/usr/src/proto-contracts:ro
      - payment_node_modules:/usr/src/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ] || [ ! -d node_modules/@ecommerce/proto-contracts ]; then
      npm install --prefer-offline --no-audit --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000;
      fi && npm run start:debug"

  order-service:
    build:
      context: ../order-service
      dockerfile: Dockerfile
    container_name: order-service
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      GRPC_URL: 0.0.0.0:${ORDER_GRPC_PORT}
      DEBUG_PORT: ${NODE_DEBUG_PORT}
      KAFKA_BROKER: ${KAFKA_BROKER}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    ports:
      - '${ORDER_HOST_PORT}:${ORDER_GRPC_PORT}'
      - '${ORDER_DEBUG_PORT}:${NODE_DEBUG_PORT}'
    volumes:
      - ../order-service:/usr/src/app
      - ../proto-contracts:/usr/src/proto-contracts:ro
      - order_node_modules:/usr/src/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ] || [ ! -d node_modules/@ecommerce/proto-contracts ]; then
      npm install --prefer-offline --no-audit --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000;
      fi && npm run start:debug"

  product-service:
    build:
      context: ../product-service
      dockerfile: Dockerfile
    container_name: product-service
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      GRPC_URL: 0.0.0.0:${PRODUCT_GRPC_PORT}
      DEBUG_PORT: ${NODE_DEBUG_PORT}
      KAFKA_BROKER: ${KAFKA_BROKER}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    ports:
      - '${PRODUCT_HOST_PORT}:${PRODUCT_GRPC_PORT}'
      - '${PRODUCT_DEBUG_PORT}:${NODE_DEBUG_PORT}'
    volumes:
      - ../product-service:/usr/src/app
      - ../proto-contracts:/usr/src/proto-contracts:ro
      - product_node_modules:/usr/src/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ] || [ ! -d node_modules/@ecommerce/proto-contracts ]; then
      npm install --prefer-offline --no-audit --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000;
      fi && npm run start:debug"

  bff-gateway:
    build:
      context: ../bff-gateway
      dockerfile: Dockerfile
    container_name: bff-gateway
    depends_on:
      auth-service:
        condition: service_started
      payment-service:
        condition: service_started
      order-service:
        condition: service_started
      product-service:
        condition: service_started
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${BFF_PORT}
      DEBUG_PORT: ${NODE_DEBUG_PORT}
      AUTH_GRPC_URL: auth-service:${AUTH_GRPC_PORT}
      PAYMENT_GRPC_URL: payment-service:${PAYMENT_GRPC_PORT}
      ORDER_GRPC_URL: order-service:${ORDER_GRPC_PORT}
      PRODUCT_GRPC_URL: product-service:${PRODUCT_GRPC_PORT}
      KAFKA_BROKER: ${KAFKA_BROKER}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    ports:
      - '${BFF_HOST_PORT}:${BFF_PORT}'
      - '${BFF_DEBUG_PORT}:${NODE_DEBUG_PORT}'
    volumes:
      - ../bff-gateway:/usr/src/app
      - ../proto-contracts:/usr/src/proto-contracts:ro
      - bff_node_modules:/usr/src/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ] || [ ! -d node_modules/@ecommerce/proto-contracts ]; then
      npm install --prefer-offline --no-audit --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000;
      fi && npm run start:debug"

volumes:
  postgres_data:
  redis_data:
  auth_node_modules:
  payment_node_modules:
  order_node_modules:
  product_node_modules:
  bff_node_modules:

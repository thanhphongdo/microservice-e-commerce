services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '12181:2181'

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:19092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - '19092:9092'

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - '15432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - '16379:6379'
    volumes:
      - redis_data:/data

  auth-service:
    build:
      context: ../auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    depends_on:
      - kafka
      - postgres
      - redis
    environment:
      NODE_ENV: development
      GRPC_URL: 0.0.0.0:50051
      DEBUG_PORT: 9229
      KAFKA_BROKER: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '15051:50051'
      - '19229:9229'
    volumes:
      - ../auth-service:/usr/src/app
      - ../proto-contracts:/usr/src/proto-contracts:ro
      - auth_node_modules:/usr/src/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ] || [ ! -d node_modules/@ecommerce/proto-contracts ] || [ ! -d node_modules/@as-integrations/express5 ]; then
      npm install --prefer-offline --no-audit --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000;
      fi && npm run start:debug"

  payment-service:
    build:
      context: ../payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    depends_on:
      - kafka
      - postgres
      - redis
    environment:
      NODE_ENV: development
      GRPC_URL: 0.0.0.0:50052
      DEBUG_PORT: 9229
      KAFKA_BROKER: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '15052:50052'
      - '29229:9229'
    volumes:
      - ../payment-service:/usr/src/app
      - ../proto-contracts:/usr/src/proto-contracts:ro
      - payment_node_modules:/usr/src/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ] || [ ! -d node_modules/@ecommerce/proto-contracts ]; then
      npm install --prefer-offline --no-audit --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000;
      fi && npm run start:debug"

  order-service:
    build:
      context: ../order-service
      dockerfile: Dockerfile
    container_name: order-service
    depends_on:
      - kafka
      - postgres
      - redis
    environment:
      NODE_ENV: development
      GRPC_URL: 0.0.0.0:50053
      DEBUG_PORT: 9229
      KAFKA_BROKER: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '15053:50053'
      - '39229:9229'
    volumes:
      - ../order-service:/usr/src/app
      - ../proto-contracts:/usr/src/proto-contracts:ro
      - order_node_modules:/usr/src/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ] || [ ! -d node_modules/@ecommerce/proto-contracts ]; then
      npm install --prefer-offline --no-audit --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000;
      fi && npm run start:debug"

  product-service:
    build:
      context: ../product-service
      dockerfile: Dockerfile
    container_name: product-service
    depends_on:
      - kafka
      - postgres
      - redis
    environment:
      NODE_ENV: development
      GRPC_URL: 0.0.0.0:50054
      DEBUG_PORT: 9229
      KAFKA_BROKER: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '15054:50054'
      - '49229:9229'
    volumes:
      - ../product-service:/usr/src/app
      - ../proto-contracts:/usr/src/proto-contracts:ro
      - product_node_modules:/usr/src/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ] || [ ! -d node_modules/@ecommerce/proto-contracts ]; then
      npm install --prefer-offline --no-audit --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000;
      fi && npm run start:debug"

  bff-gateway:
    build:
      context: ../bff-gateway
      dockerfile: Dockerfile
    container_name: bff-gateway
    depends_on:
      - auth-service
      - payment-service
      - order-service
      - product-service
      - kafka
      - postgres
      - redis
    environment:
      NODE_ENV: development
      PORT: 3000
      DEBUG_PORT: 9229
      AUTH_GRPC_URL: auth-service:50051
      PAYMENT_GRPC_URL: payment-service:50052
      ORDER_GRPC_URL: order-service:50053
      PRODUCT_GRPC_URL: product-service:50054
      KAFKA_BROKER: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '13000:3000'
      - '59229:9229'
    volumes:
      - ../bff-gateway:/usr/src/app
      - ../proto-contracts:/usr/src/proto-contracts:ro
      - bff_node_modules:/usr/src/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ] || [ ! -d node_modules/@ecommerce/proto-contracts ]; then
      npm install --prefer-offline --no-audit --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000;
      fi && npm run start:debug"

volumes:
  postgres_data:
  redis_data:
  auth_node_modules:
  payment_node_modules:
  order_node_modules:
  product_node_modules:
  bff_node_modules:

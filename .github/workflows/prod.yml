name: Production CI/CD

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/prod.yml"
      - "auth-service/**"
      - "payment-service/**"
      - "order-service/**"
      - "product-service/**"
      - "bff-gateway/**"
      - "infra/docker-compose.prod.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to production host after build"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            dockerfile: auth-service/Dockerfile.prod
          - service: payment-service
            dockerfile: payment-service/Dockerfile.prod
          - service: order-service
            dockerfile: order-service/Dockerfile.prod
          - service: product-service
            dockerfile: product-service/Dockerfile.prod
          - service: bff-gateway
            dockerfile: bff-gateway/Dockerfile.prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:sha-${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:sha-${{ github.sha }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy == 'true' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose --env-file .env.prod -f infra/docker-compose.prod.yml pull
            docker compose --env-file .env.prod -f infra/docker-compose.prod.yml up -d

name: Production CI/CD

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/prod.yml"
      - "auth-service/**"
      - "payment-service/**"
      - "order-service/**"
      - "product-service/**"
      - "bff-gateway/**"
      - "e-commerce-fe/**"
      - "e-commerce-admin-fe/**"
      - "infra/docker-compose.prod.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to production host after build"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'proto-contracts/**'
              - 'infra/docker-compose.prod.yml'
              - '.github/workflows/prod.yml'
            auth_service:
              - 'auth-service/**'
            payment_service:
              - 'payment-service/**'
            order_service:
              - 'order-service/**'
            product_service:
              - 'product-service/**'
            bff_gateway:
              - 'bff-gateway/**'
            e_commerce_fe:
              - 'e-commerce-fe/**'
            e_commerce_admin_fe:
              - 'e-commerce-admin-fe/**'

      - name: Build matrix
        id: matrix
        uses: actions/github-script@v7
        with:
          script: |
            const isManual = context.eventName === 'workflow_dispatch';
            const shared = '${{ steps.filter.outputs.shared }}' === 'true';
            const allServices = [
              { service: 'auth-service', dockerfile: 'auth-service/Dockerfile.prod' },
              { service: 'payment-service', dockerfile: 'payment-service/Dockerfile.prod' },
              { service: 'order-service', dockerfile: 'order-service/Dockerfile.prod' },
              { service: 'product-service', dockerfile: 'product-service/Dockerfile.prod' },
              { service: 'bff-gateway', dockerfile: 'bff-gateway/Dockerfile.prod' },
              { service: 'e-commerce-fe', dockerfile: 'e-commerce-fe/Dockerfile.prod' },
              { service: 'e-commerce-admin-fe', dockerfile: 'e-commerce-admin-fe/Dockerfile.prod' },
            ];

            let include = [];
            if (isManual || shared) {
              include = allServices;
            } else {
              for (const item of allServices) {
                const key = item.service;
                const changed = '${{ steps.filter.outputs.auth_service }}' === 'true' && key === 'auth-service'
                  || '${{ steps.filter.outputs.payment_service }}' === 'true' && key === 'payment-service'
                  || '${{ steps.filter.outputs.order_service }}' === 'true' && key === 'order-service'
                  || '${{ steps.filter.outputs.product_service }}' === 'true' && key === 'product-service'
                  || '${{ steps.filter.outputs.bff_gateway }}' === 'true' && key === 'bff-gateway'
                  || '${{ steps.filter.outputs.e_commerce_fe }}' === 'true' && key === 'e-commerce-fe'
                  || '${{ steps.filter.outputs.e_commerce_admin_fe }}' === 'true' && key === 'e-commerce-admin-fe';
                if (changed) include.push(item);
              }
            }

            core.setOutput('matrix', JSON.stringify({ include }));
            core.setOutput('has_changes', include.length > 0 ? 'true' : 'false');

  build-and-push:
    name: Build and push ${{ matrix.service }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:sha-${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:sha-${{ github.sha }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy == 'true' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose --env-file .env.prod -f infra/docker-compose.prod.yml pull
            docker compose --env-file .env.prod -f infra/docker-compose.prod.yml up -d
